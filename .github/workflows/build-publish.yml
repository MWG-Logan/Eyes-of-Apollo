name: Build and Publish MAUI

on:
  push:
    branches: [ main ]
    paths:
      - 'MWG.EyesOfApollo.Desktop/**'
      - 'Themes/**'
  workflow_dispatch:
    inputs:
      force_release:
        description: 'Create/update release even if tag already exists'
        required: false
        default: false
        type: boolean

permissions:
  id-token: write
  contents: read

env:
  DOTNET_VERSION: 10.0.x

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
      - name: Install MAUI workload
        run: dotnet workload install maui
      - name: Publish Windows portable
        run: >-
          dotnet publish MWG.EyesOfApollo.Desktop/MWG.EyesOfApollo.Desktop.csproj
          -c Release
          -f net10.0-windows10.0.19041.0
          -p:RuntimeIdentifierOverride=win-x64
          -p:WindowsPackageType=None
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
      - name: Publish Windows MSIX
        run: >-
          dotnet publish MWG.EyesOfApollo.Desktop/MWG.EyesOfApollo.Desktop.csproj
          -c Release
          -f net10.0-windows10.0.19041.0
          -p:RuntimeIdentifierOverride=win-x64
          -p:WindowsPackageType=MSIX
          -p:GenerateAppxPackageOnBuild=true
          -p:SelfContained=true
          -p:WindowsAppSDKSelfContained=true
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Sign portable EXE/DLLs with Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: MWG.EyesOfApollo.Desktop/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
          files-folder-filter: exe,dll
          files-folder-recurse: false
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Sign MSIX with Artifact Signing
        uses: azure/artifact-signing-action@v1
        with:
          endpoint: ${{ secrets.ARTIFACT_SIGNING_ENDPOINT }}
          signing-account-name: ${{ secrets.ARTIFACT_SIGNING_ACCOUNT_NAME }}
          certificate-profile-name: ${{ secrets.ARTIFACT_SIGNING_CERT_PROFILE }}
          files-folder: MWG.EyesOfApollo.Desktop/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages
          files-folder-filter: MWG.EyesOfApollo.*.msix
          files-folder-recurse: true
          file-digest: SHA256
          timestamp-rfc3161: http://timestamp.acs.microsoft.com
          timestamp-digest: SHA256
      - name: Upload Windows portable
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable
          path: MWG.EyesOfApollo.Desktop/bin/Release/net10.0-windows10.0.19041.0/win-x64/publish
      - name: Upload Windows MSIX
        uses: actions/upload-artifact@v4
        with:
          name: windows-msix
          path: MWG.EyesOfApollo.Desktop/bin/Release/net10.0-windows10.0.19041.0/win-x64/AppPackages

  release:
    needs: [windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from csproj
        id: version
        shell: bash
        run: |
          display_ver=$(grep -oP '(?<=<ApplicationDisplayVersion>)[^<]+' MWG.EyesOfApollo.Desktop/MWG.EyesOfApollo.Desktop.csproj)
          echo "tag=v${display_ver}" >> "$GITHUB_OUTPUT"

      - name: Check if tag already exists
        id: check_tag
        shell: bash
        run: |
          force_release="${{ github.event_name == 'workflow_dispatch' && inputs.force_release || false }}"

          if [ "$force_release" = "true" ]; then
            echo "exists=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git ls-remote --tags origin "refs/tags/${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all artifacts
        if: steps.check_tag.outputs.exists == 'false'
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub release
        if: steps.check_tag.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Eyes of Apollo ${{ steps.version.outputs.tag }}
          overwrite_files: true
          files: |
            artifacts/windows-portable/**/MWG.EyesOfApollo.Desktop.exe
            artifacts/windows-msix/**/*.msix
            artifacts/windows-msix/**/*.msixbundle
            artifacts/windows-msix/**/*.msixupload
          generate_release_notes: true
